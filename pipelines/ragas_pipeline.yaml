          \            with open(token_path, \"r\", encoding=\"utf-8\") as f:\n  \
          \              token = f.read().strip()\n            if token:\n       \
          \         os.environ[\"MLFLOW_TRACKING_TOKEN\"] = token\n              \
          \  print(\"[VERIFY] Set MLFLOW_TRACKING_TOKEN from K8s service account\"\
          )\n        except FileNotFoundError:\n            pass  # Not running in\
          \ K8s; token not required\n        except Exception as e:\n            print(f\"\
          [WARN] Could not read K8s token from {token_path}: {e}\")\n\n    print(f\"\
          [VERIFY] Testing MLflow tracking URL: {uri}\")\n\n    try:\n        client\
          \ = MlflowClient(tracking_uri=uri)\n        experiments = client.search_experiments(max_results=1)\n\
          \        print(f\"[OK] MLflow tracking is reachable (found {len(experiments)}+\
          \ experiment(s))\")\n        return uri\n    except Exception as e:\n  \
          \      print(f\"[ERROR] MLflow tracking verification failed: {e}\")\n  \
