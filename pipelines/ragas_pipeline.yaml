pipelineInfo:
  description: Pipeline to generate and evaluate RAGAS datasets from a git repository
  name: ragas-evaluation-pipeline
root:
  dag:
    tasks:
      create-mlflow-experiment:
        cachingOptions: {}
        componentRef:
          name: comp-create-mlflow-experiment
        dependentTasks:
        - verify-mlflow-tracking
        inputs:
          parameters:
            mlflow_experiment_name:
              componentInputParameter: mlflow_experiment_name
            mlflow_insecure_tls:
              componentInputParameter: mlflow_insecure_tls
            mlflow_tracking_uri:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: verify-mlflow-tracking
            mlflow_tracking_uri_param:
              componentInputParameter: mlflow_tracking_uri
            mlflow_workspace:
              componentInputParameter: mlflow_workspace
        taskInfo:
          name: create-mlflow-experiment
      discover-mcp-tools:
        cachingOptions: {}
        componentRef:
          name: comp-discover-mcp-tools
        inputs:
          parameters:
            tools:
              componentInputParameter: tools
        taskInfo:
          name: discover-mcp-tools
      generate-ragas-dataset:
        cachingOptions: {}
        componentRef:
          name: comp-generate-ragas-dataset
        dependentTasks:
        - discover-mcp-tools
        - load-base-dataset-from-git
        - resolve-vector-store
        - verify-mlflow-tracking
        inputs:
          artifacts:
            base_dataset_input:
              taskOutputArtifact:
                outputArtifactKey: base_dataset_output
                producerTask: load-base-dataset-from-git
          parameters:
            agent_type:
              componentInputParameter: agent_type
            file_search_max_chunks:
              componentInputParameter: file_search_max_chunks
            file_search_max_tokens_per_chunk:
              componentInputParameter: file_search_max_tokens_per_chunk
            file_search_score_threshold:
              componentInputParameter: file_search_score_threshold
            force_file_search:
              componentInputParameter: force_file_search
            instructions:
              componentInputParameter: instructions
            mcp_tools_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: discover-mcp-tools
            model_id:
              componentInputParameter: model_id
            pattern:
              componentInputParameter: pattern
            ranker:
              componentInputParameter: ranker
            retrieval_mode:
              componentInputParameter: retrieval_mode
            timeout:
              componentInputParameter: timeout
            vector_store_id:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: resolve-vector-store
        taskInfo:
          name: generate-ragas-dataset
      load-base-dataset-from-git:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-load-base-dataset-from-git
        inputs:
          parameters:
            base_dataset_filename:
              componentInputParameter: base_dataset_filename
            git_context:
              componentInputParameter: git_context
            git_ref:
              componentInputParameter: git_ref
            git_repo:
              componentInputParameter: git_repo
        taskInfo:
          name: load-base-dataset-from-git
      log-mlflow-metrics:
        cachingOptions: {}
        componentRef:
          name: comp-log-mlflow-metrics
        dependentTasks:
        - create-mlflow-experiment
        - run-ragas-evaluation
        - verify-mlflow-tracking
        inputs:
          artifacts:
            evaluation_results_input:
              taskOutputArtifact:
                outputArtifactKey: evaluation_results_output
                producerTask: run-ragas-evaluation
          parameters:
            experiment_id:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: create-mlflow-experiment
            mlflow_insecure_tls:
              componentInputParameter: mlflow_insecure_tls
            mlflow_tracking_uri:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: verify-mlflow-tracking
            mlflow_tracking_uri_param:
              componentInputParameter: mlflow_tracking_uri
            mlflow_workspace:
              componentInputParameter: mlflow_workspace
        taskInfo:
          name: log-mlflow-metrics
      resolve-vector-store:
        cachingOptions: {}
        componentRef:
          name: comp-resolve-vector-store
        inputs:
          parameters:
            vector_store_name:
              componentInputParameter: vector_store_name
        taskInfo:
          name: resolve-vector-store
      run-ragas-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-run-ragas-evaluation
        dependentTasks:
        - generate-ragas-dataset
        inputs:
          artifacts:
            ragas_dataset_input:
              taskOutputArtifact:
                outputArtifactKey: ragas_dataset_output
                producerTask: generate-ragas-dataset
          parameters:
            batch_size:
              componentInputParameter: batch_size
            evaluation_embedding_model_id:
              componentInputParameter: evaluation_embedding_model_id
            evaluation_model_id:
              componentInputParameter: evaluation_model_id
            metrics:
              componentInputParameter: metrics
            show_progress:
              runtimeValue:
                constant: true
            timeout:
              componentInputParameter: timeout
        taskInfo:
          name: run-ragas-evaluation
      verify-mlflow-tracking:
        cachingOptions: {}
        componentRef:
          name: comp-verify-mlflow-tracking
        inputs:
          parameters:
            mlflow_insecure_tls:
              componentInputParameter: mlflow_insecure_tls
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            mlflow_workspace:
              componentInputParameter: mlflow_workspace
        taskInfo:
          name: verify-mlflow-tracking
  inputDefinitions:
    parameters:
      agent_type:
        defaultValue: default
        isOptional: true
        parameterType: STRING
      base_dataset_filename:
        defaultValue: base_dataset_small.json
        isOptional: true
        parameterType: STRING
      batch_size:
        defaultValue: 0.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      evaluation_embedding_model_id:
        defaultValue: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
        isOptional: true
        parameterType: STRING
      evaluation_model_id:
        defaultValue: qwen3-8b-fp8-dynamic/qwen3-8b-fp8-dynamic
        isOptional: true
        parameterType: STRING
      file_search_max_chunks:
        defaultValue: 5.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      file_search_max_tokens_per_chunk:
        defaultValue: 512.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      file_search_score_threshold:
        defaultValue: 0.7
        isOptional: true
        parameterType: NUMBER_DOUBLE
      force_file_search:
        defaultValue: false
        isOptional: true
        parameterType: BOOLEAN
      git_context:
        defaultValue: materials/datasets
        isOptional: true
        parameterType: STRING
      git_ref:
        defaultValue: next
        isOptional: true
        parameterType: STRING
      git_repo:
        defaultValue: alpha-hack-program/llama-stack-demo
        isOptional: true
        parameterType: STRING
      instructions:
        defaultValue: You are a helpful assistant that can answer questions about
          the documents in the vector store.
        isOptional: true
        parameterType: STRING
      metrics:
        defaultValue: answer_relevancy,faithfulness,context_precision,context_recall
        isOptional: true
        parameterType: STRING
      mlflow_experiment_name:
        defaultValue: ragas-scoring-experiment
        isOptional: true
        parameterType: STRING
      mlflow_insecure_tls:
        defaultValue: false
        isOptional: true
        parameterType: BOOLEAN
      mlflow_tracking_uri:
        defaultValue: https://mlflow.redhat-ods-applications.svc.cluster.local:8443
        isOptional: true
        parameterType: STRING
      mlflow_workspace:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      model_id:
        defaultValue: qwen3-8b-fp8-dynamic/qwen3-8b-fp8-dynamic
        isOptional: true
        parameterType: STRING
      pattern:
        defaultValue: simple
        isOptional: true
        parameterType: STRING
      ranker:
        defaultValue: default
        isOptional: true
        parameterType: STRING
      retrieval_mode:
        defaultValue: vector
        isOptional: true
        parameterType: STRING
      timeout:
        defaultValue: 600.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      tools:
        defaultValue: all
        isOptional: true
        parameterType: STRING
      vector_store_name:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
