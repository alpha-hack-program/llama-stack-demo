# PIPELINE DEFINITION
# Name: ragas-evaluation-pipeline
# Description: Pipeline to generate and evaluate RAGAS datasets from a git repository
# Inputs:
#    agent_type: str [Default: 'default']
#    base_dataset_filename: str [Default: 'base_dataset_small.json']
#    batch_size: int [Default: 0.0]
#    evaluation_embedding_model_id: str [Default: 'sentence-transformers/nomic-ai/nomic-embed-text-v1.5']
#    evaluation_model_id: str [Default: 'qwen3-8b-fp8-dynamic/qwen3-8b-fp8-dynamic']
#    file_search_max_chunks: int [Default: 5.0]
#    file_search_max_tokens_per_chunk: int [Default: 512.0]
#    file_search_score_threshold: float [Default: 0.7]
#    force_file_search: bool [Default: False]
#    git_context: str [Default: 'materials/datasets']
#    git_ref: str [Default: 'next']
#    git_repo: str [Default: 'alpha-hack-program/llama-stack-demo']
#    instructions: str [Default: 'You are a helpful assistant that can answer questions about the documents in the vector store.']
#    metrics: str [Default: 'answer_relevancy,faithfulness,context_precision,context_recall']
#    mlflow_experiment_name: str [Default: 'ragas-scoring-experiment']
#    mlflow_insecure_tls: bool [Default: False]
#    mlflow_tracking_uri: str [Default: 'https://mlflow.redhat-ods-applications.svc.cluster.local:8443']
#    mlflow_workspace: str [Default: '']
#    model_id: str [Default: 'qwen3-8b-fp8-dynamic/qwen3-8b-fp8-dynamic']
#    pattern: str [Default: 'simple']
#    ranker: str [Default: 'default']
#    retrieval_mode: str [Default: 'vector']
#    timeout: int [Default: 600.0]
#    tools: str [Default: 'all']
#    vector_store_name: str [Default: '']
components:
  comp-create-mlflow-experiment:
    executorLabel: exec-create-mlflow-experiment
    inputDefinitions:
      parameters:
        mlflow_experiment_name:
          description: Name of the experiment to create or reuse.
          parameterType: STRING
        mlflow_insecure_tls:
          description: If True, skip TLS verification (for self-signed certs).
          parameterType: BOOLEAN
        mlflow_tracking_uri:
          description: Validated tracking URI from verify_mlflow_tracking output.
          parameterType: STRING
        mlflow_tracking_uri_param:
          description: Pipeline-level tracking URI (fallback when upstream output
            empty).
          parameterType: STRING
        mlflow_workspace:
          description: 'Workspace name (fallback). In K8s, defaults to pod namespace;

            MLFLOW_WORKSPACE env var supersedes.'
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-discover-mcp-tools:
    executorLabel: exec-discover-mcp-tools
    inputDefinitions:
      parameters:
        tools:
          defaultValue: ''
          description: "MCP tools filter. Options:\n- \"\" (empty) or \"none\": Return\
            \ empty list (no MCP tools; only file_search will be used)\n- \"all\"\
            : Discover and return all available MCP tools\n- \"tool1,tool2\": Comma-separated\
            \ list of specific MCP tool names\n  (e.g., \"cluster-insights,compatibility-engine\"\
            )"
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-generate-ragas-dataset:
    executorLabel: exec-generate-ragas-dataset
    inputDefinitions:
      artifacts:
        base_dataset_input:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Input artifact containing the base dataset JSON
      parameters:
        agent_type:
          defaultValue: default
          description: 'Agent backend: "default" (Llama Stack Responses API) or "lang-graph"'
          isOptional: true
          parameterType: STRING
        file_search_max_chunks:
          defaultValue: 5.0
          description: 'Max number of chunks to retrieve (OpenAI: max_num_results)'
          isOptional: true
          parameterType: NUMBER_INTEGER
        file_search_max_tokens_per_chunk:
          defaultValue: 512.0
          description: Max tokens per chunk in results
          isOptional: true
          parameterType: NUMBER_INTEGER
        file_search_score_threshold:
          defaultValue: 0.7
          description: "Min score for returned results (0\u20131)"
          isOptional: true
          parameterType: NUMBER_DOUBLE
        force_file_search:
          defaultValue: false
          description: If True, pre-fetch RAG chunks and inject as context (no file_search
            tool)
          isOptional: true
          parameterType: BOOLEAN
        instructions:
          defaultValue: ''
          description: System prompt/instructions for the model (optional)
          isOptional: true
          parameterType: STRING
        mcp_tools_json:
          defaultValue: '[]'
          description: JSON string of MCP tool configs (from discover_mcp_tools)
          isOptional: true
          parameterType: STRING
        model_id:
          description: Model identifier to use for inference
          parameterType: STRING
        pattern:
          defaultValue: simple
          description: 'Execution pattern: "simple" (single call) or "plan_execute"
            (planner then executor)'
          isOptional: true
          parameterType: STRING
        ranker:
          defaultValue: default
          description: Ranker to use for scoring retrieved chunks (e.g. "default")
          isOptional: true
          parameterType: STRING
        retrieval_mode:
          defaultValue: vector
          description: Retrieval mode to use (vector, text, hybrid)
          isOptional: true
          parameterType: STRING
        timeout:
          defaultValue: 300.0
          description: Timeout in seconds for requests
          isOptional: true
          parameterType: NUMBER_INTEGER
        vector_store_id:
          description: Vector store ID containing documents
          parameterType: STRING
    outputDefinitions:
      artifacts:
        ragas_dataset_output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-load-base-dataset-from-git:
    executorLabel: exec-load-base-dataset-from-git
    inputDefinitions:
      parameters:
        base_dataset_filename:
          description: Name of the dataset file (e.g., 'base_dataset.json')
          parameterType: STRING
        git_context:
          description: Context path in the repository (e.g., 'materials/datasets')
          parameterType: STRING
        git_ref:
          description: Git reference/branch (e.g., 'main', 'next')
          parameterType: STRING
        git_repo:
          description: GitHub repository (e.g., 'alpha-hack-program/llama-stack-demo')
          parameterType: STRING
    outputDefinitions:
      artifacts:
        base_dataset_output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-log-mlflow-metrics:
    executorLabel: exec-log-mlflow-metrics
    inputDefinitions:
      artifacts:
        evaluation_results_input:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Evaluation results artifact from run_ragas_evaluation.
      parameters:
        experiment_id:
          description: MLflow experiment ID from create_mlflow_experiment.
          parameterType: STRING
        mlflow_insecure_tls:
          description: If True, skip TLS verification.
          parameterType: BOOLEAN
        mlflow_tracking_uri:
          description: Tracking URI from verify_mlflow_tracking output.
          parameterType: STRING
        mlflow_tracking_uri_param:
          description: Pipeline-level tracking URI (fallback).
          parameterType: STRING
        mlflow_workspace:
          description: 'Workspace name (fallback). In K8s, defaults to pod namespace;

            MLFLOW_WORKSPACE env var supersedes.'
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-resolve-vector-store:
    executorLabel: exec-resolve-vector-store
    inputDefinitions:
      parameters:
        vector_store_name:
          description: Name of the vector store to find
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-run-ragas-evaluation:
    executorLabel: exec-run-ragas-evaluation
    inputDefinitions:
      artifacts:
        ragas_dataset_input:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Input artifact containing the RAGAS dataset JSON
      parameters:
        batch_size:
          defaultValue: 0.0
          description: RAGAS evaluate() batch size (0 = None, no batching)
          isOptional: true
          parameterType: NUMBER_INTEGER
        evaluation_embedding_model_id:
          description: Embedding model identifier for RAGAS metrics (e.g. answer_relevancy)
          parameterType: STRING
        evaluation_model_id:
          description: 'LLM model identifier for RAGAS scoring (judge); can differ
            from

            the model used to generate the dataset'
          parameterType: STRING
        metrics:
          description: Comma-separated list of RAGAS metrics to compute
          parameterType: STRING
        show_progress:
          defaultValue: true
          description: Whether to show progress bar during evaluation
          isOptional: true
          parameterType: BOOLEAN
        timeout:
          defaultValue: 600.0
          description: Timeout in seconds for Llama Stack client
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        evaluation_output_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        evaluation_results_output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-verify-mlflow-tracking:
    executorLabel: exec-verify-mlflow-tracking
    inputDefinitions:
      parameters:
        mlflow_insecure_tls:
          defaultValue: false
          description: If True, skip TLS verification (for self-signed certs).
          isOptional: true
          parameterType: BOOLEAN
        mlflow_tracking_uri:
          defaultValue: https://mlflow.redhat-ods-applications.svc.cluster.local:8443
          description: 'MLflow tracking server URL (e.g.,

            https://mlflow.redhat-ods-applications.svc.cluster.local:8443).

            If empty, uses MLFLOW_TRACKING_URI env var.'
          isOptional: true
          parameterType: STRING
        mlflow_workspace:
          defaultValue: ''
          description: 'Workspace name (fallback). When running in K8s, workspace

            defaults to pod namespace; MLFLOW_WORKSPACE env var supersedes.'
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-create-mlflow-experiment:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - create_mlflow_experiment
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow>=3.6.0,<3.7.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef create_mlflow_experiment(\n    mlflow_tracking_uri: str,\n  \
          \  mlflow_experiment_name: str,\n    mlflow_workspace: str,\n    mlflow_insecure_tls:\
          \ bool,\n    mlflow_tracking_uri_param: str,\n) -> str:\n    \"\"\"\n  \
          \  Create an MLflow experiment after MLflow connectivity has been verified.\n\
          \n    Should run after verify_mlflow_tracking. All input parameters are\
          \ required;\n    raises ValueError if any parameter is not passed or is\
          \ empty.\n\n    Tags the experiment with mlflow.experimentKind=custom_model_development\n\
          \    (for Red Hat ODSC MLflow UI compatibility).\n\n    Args:\n        mlflow_tracking_uri:\
          \ Validated tracking URI from verify_mlflow_tracking output.\n        mlflow_experiment_name:\
          \ Name of the experiment to create or reuse.\n        mlflow_workspace:\
          \ Workspace name (fallback). In K8s, defaults to pod namespace;\n      \
          \      MLFLOW_WORKSPACE env var supersedes.\n        mlflow_insecure_tls:\
          \ If True, skip TLS verification (for self-signed certs).\n        mlflow_tracking_uri_param:\
          \ Pipeline-level tracking URI (fallback when upstream output empty).\n\n\
          \    Returns:\n        The experiment ID.\n    \"\"\"\n    import os\n\n\
          \    from mlflow.tracking.request_header.abstract_request_header_provider\
          \ import RequestHeaderProvider\n    from mlflow.tracking.request_header.registry\
          \ import _request_header_provider_registry\n    from mlflow.tracking import\
          \ MlflowClient\n\n    if mlflow_insecure_tls is None:\n        raise ValueError(\"\
          mlflow_insecure_tls is required\")\n\n    uri = (\n        (mlflow_tracking_uri\
          \ or \"\").strip()\n        or (mlflow_tracking_uri_param or \"\").strip()\n\
          \        or os.environ.get(\"MLFLOW_TRACKING_URI\", \"\").strip()\n    )\n\
          \    if not uri:\n        raise ValueError(\"mlflow_tracking_uri or mlflow_tracking_uri_param\
          \ is required\")\n\n    experiment_name = (mlflow_experiment_name or \"\"\
          ).strip()\n    if not experiment_name:\n        raise ValueError(\"mlflow_experiment_name\
          \ is required\")\n\n    # Workspace must match pod namespace when running\
          \ in K8s; MLFLOW_WORKSPACE env var supersedes\n    workspace = os.environ.get(\"\
          MLFLOW_WORKSPACE\", \"\").strip()\n    if not workspace:\n        namespace_path\
          \ = os.environ.get(\"NAMESPACE_PATH\", \"/var/run/secrets/kubernetes.io/serviceaccount/namespace\"\
          )\n        try:\n            with open(namespace_path, \"r\", encoding=\"\
          utf-8\") as f:\n                workspace = f.read().strip()\n        except\
          \ FileNotFoundError:\n            pass\n    if not workspace:\n        workspace\
          \ = (mlflow_workspace or \"\").strip()\n    if not workspace:\n        raise\
          \ ValueError(\"mlflow_workspace is required (or set MLFLOW_WORKSPACE, or\
          \ run in K8s where pod namespace is used)\")\n\n    os.environ[\"MLFLOW_WORKSPACE\"\
          ] = workspace\n\n    class _WorkspaceHeaderProvider(RequestHeaderProvider):\n\
          \        def in_context(self):\n            return bool(os.environ.get(\"\
          MLFLOW_WORKSPACE\"))\n\n        def request_headers(self):\n           \
          \ return {\"X-MLFLOW-WORKSPACE\": os.environ[\"MLFLOW_WORKSPACE\"]}\n\n\
          \    _request_header_provider_registry.register(_WorkspaceHeaderProvider)\n\
          \n    if mlflow_insecure_tls:\n        os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"\
          ] = \"true\"\n\n    # Use K8s service account token when running in OpenShift\
          \ (e.g., Red Hat ODSC MLflow)\n    if not os.environ.get(\"MLFLOW_TRACKING_TOKEN\"\
          ):\n        token_path = os.environ.get(\"TOKEN_PATH\", \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\
          )\n        try:\n            with open(token_path, \"r\", encoding=\"utf-8\"\
          ) as f:\n                token = f.read().strip()\n            if token:\n\
          \                os.environ[\"MLFLOW_TRACKING_TOKEN\"] = token\n       \
          \         print(\"[CREATE] Using K8s service account token for MLflow auth\"\
          )\n        except FileNotFoundError:\n            pass  # Not running in\
          \ K8s; token not required\n        except Exception as e:\n            print(f\"\
          [WARN] Could not read K8s token from {token_path}: {e}\")\n\n    print(f\"\
          [CREATE] Creating MLflow experiment: {experiment_name}\")\n\n    default_experiment_tag_key\
          \ = \"mlflow.experimentKind\"\n    default_experiment_tag_value = \"custom_model_development\"\
          \n\n    try:\n        client = MlflowClient(tracking_uri=uri)\n\n      \
          \  existing = client.get_experiment_by_name(experiment_name)\n        if\
          \ existing:\n            experiment_id = existing.experiment_id\n      \
          \      print(f\"[OK] Experiment already exists: {experiment_name} (id={experiment_id})\"\
          )\n        else:\n            experiment_id = client.create_experiment(experiment_name)\n\
          \            print(f\"[OK] Created experiment: {experiment_name} (id={experiment_id})\"\
          )\n\n        client.set_experiment_tag(experiment_id, default_experiment_tag_key,\
          \ default_experiment_tag_value)\n        print(f\"[OK] Tagged experiment\
          \ with {default_experiment_tag_key}={default_experiment_tag_value}\")\n\n\
          \        return experiment_id\n    except Exception as e:\n        print(f\"\
          [ERROR] Failed to create MLflow experiment: {e}\")\n        raise ValueError(f\"\
          Failed to create MLflow experiment '{experiment_name}': {e}\") from e\n\n"
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.1
          memoryLimit: 0.536870912
          memoryRequest: 0.268435456
          resourceCpuLimit: '1'
          resourceCpuRequest: 100m
          resourceMemoryLimit: 512Mi
          resourceMemoryRequest: 256Mi
    exec-discover-mcp-tools:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - discover_mcp_tools
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.4.2'\
          \ 'httpx'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef discover_mcp_tools(\n    tools: str = \"\",\n) -> str:\n    \"\
          \"\"\n    Discover MCP tools from Llama Stack server.\n\n    Args:\n   \
          \     tools: MCP tools filter. Options:\n            - \"\" (empty) or \"\
          none\": Return empty list (no MCP tools; only file_search will be used)\n\
          \            - \"all\": Discover and return all available MCP tools\n  \
          \          - \"tool1,tool2\": Comma-separated list of specific MCP tool\
          \ names\n              (e.g., \"cluster-insights,compatibility-engine\"\
          )\n\n    Returns:\n        JSON string containing list of MCP tool configurations\n\
          \    \"\"\"\n    import json\n    import os\n\n    import httpx\n    from\
          \ llama_stack_client import LlamaStackClient\n\n    tool_filter = (tools\
          \ or \"\").strip()\n    if not tool_filter or tool_filter.lower() == \"\
          none\":\n        print(\"[INFO] No MCP tools requested (tools=%r), returning\
          \ empty list\" % (tools,))\n        return json.dumps([])\n\n    llama_stack_host\
          \ = os.environ.get(\"LLAMA_STACK_HOST\")\n    llama_stack_port = os.environ.get(\"\
          LLAMA_STACK_PORT\")\n    llama_stack_secure = os.environ.get(\"LLAMA_STACK_SECURE\"\
          , \"\").lower() in (\"true\", \"1\", \"yes\")\n\n    print(f\"LLAMA_STACK_HOST:\
          \ {llama_stack_host}\")\n    print(f\"LLAMA_STACK_PORT: {llama_stack_port}\"\
          )\n    print(f\"LLAMA_STACK_SECURE: {llama_stack_secure}\")\n\n    if not\
          \ llama_stack_host:\n        raise ValueError(\"LLAMA_STACK_HOST environment\
          \ variable must be set\")\n    if not llama_stack_port:\n        raise ValueError(\"\
          LLAMA_STACK_PORT environment variable must be set\")\n\n    base_url = f\"\
          {'https' if llama_stack_secure else 'http'}://{llama_stack_host}:{llama_stack_port}\"\
          \n    print(f\"LLAMA_STACK_BASE_URL: {base_url}\")\n\n    http_client =\
          \ httpx.Client(verify=False, timeout=60)\n    client = LlamaStackClient(base_url=base_url,\
          \ http_client=http_client)\n\n    print(f\"\\n[SEARCH] Discovering MCP tools\
          \ (filter: '{tool_filter}')...\")\n\n    mcp_tools = []\n\n    try:\n  \
          \      tool_groups = list(client.toolgroups.list())\n    except Exception\
          \ as e:\n        raise ValueError(f\"Failed to list tool groups from Llama\
          \ Stack: {e}\") from e\n\n    print(f\"   Found {len(tool_groups)} tool\
          \ groups\")\n\n    requested_tools = []\n    if tool_filter.lower() != \"\
          all\":\n        requested_tools = [t.strip().lower() for t in tool_filter.split(\"\
          ,\") if t.strip()]\n\n    found_tools = []\n\n    for group in tool_groups:\n\
          \        if not hasattr(group, \"identifier\"):\n            continue\n\n\
          \        identifier = group.identifier\n        provider_id = getattr(group,\
          \ \"provider_id\", None)\n\n        if not identifier.startswith(\"mcp::\"\
          ):\n            continue\n        if provider_id and provider_id != \"model-context-protocol\"\
          :\n            continue\n\n        tool_name = identifier.split(\"::\",\
          \ 1)[1] if \"::\" in identifier else identifier\n\n        if tool_filter.lower()\
          \ != \"all\":\n            if tool_name.lower() not in requested_tools:\n\
          \                continue\n\n        mcp_endpoint = getattr(group, \"mcp_endpoint\"\
          , None)\n        server_url = None\n        if mcp_endpoint:\n         \
          \   if hasattr(mcp_endpoint, \"uri\"):\n                server_url = mcp_endpoint.uri\n\
          \            elif isinstance(mcp_endpoint, dict):\n                server_url\
          \ = mcp_endpoint.get(\"uri\")\n\n        if server_url:\n            mcp_tools.append({\n\
          \                \"type\": \"mcp\",\n                \"server_label\": tool_name,\n\
          \                \"server_url\": server_url,\n            })\n         \
          \   found_tools.append(tool_name.lower())\n            print(f\"   [OK]\
          \ Found MCP tool: {tool_name} ({server_url})\")\n        else:\n       \
          \     print(f\"   [WARN] Skipping {tool_name} (no server URL found)\")\n\
          \n    if requested_tools:\n        missing_tools = [t for t in requested_tools\
          \ if t not in found_tools]\n        if missing_tools:\n            available_mcp_tools\
          \ = [\n                g.identifier.split(\"::\", 1)[1]\n              \
          \  for g in tool_groups\n                if hasattr(g, \"identifier\") and\
          \ g.identifier.startswith(\"mcp::\")\n            ]\n            raise ValueError(\n\
          \                f\"Requested MCP tools not found: {missing_tools}. \"\n\
          \                f\"Available MCP tools: {available_mcp_tools}\"\n     \
          \       )\n\n    print(f\"\\n[DONE] Discovered {len(mcp_tools)} MCP tool(s)\"\
          )\n    return json.dumps(mcp_tools, indent=2)\n\n"
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.1
          memoryLimit: 0.536870912
          memoryRequest: 0.268435456
          resourceCpuLimit: '1'
          resourceCpuRequest: 100m
          resourceMemoryLimit: 512Mi
          resourceMemoryRequest: 256Mi
    exec-generate-ragas-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_ragas_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.4.2'\
